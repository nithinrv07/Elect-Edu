steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/electedu:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/electedu:latest'
      - '.'
    id: 'build-image'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/electedu:$SHORT_SHA'
    id: 'push-image'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'electedu'
      - '--image'
      - 'gcr.io/$PROJECT_ID/electedu:$SHORT_SHA'
      - '--region'
      - 'asia-south2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '100'
    id: 'deploy'

# Store build images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/electedu:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/electedu:latest'

# Set build timeout to 15 minutes
timeout: '900s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
