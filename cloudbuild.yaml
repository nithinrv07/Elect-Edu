steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/electedu/electedu:latest'
      - '-t'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/electedu/electedu:$SHORT_SHA'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    id: 'build-image'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/electedu/electedu:latest'
    id: 'push-image'

  # Deploy to Cloud Run with proper error handling
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'electedu'
      - '--image'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/electedu/electedu:latest'
      - '--region'
      - 'asia-south2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '100'
      - '--port'
      - '8080'
      - '--no-gen2'
    id: 'deploy'

# Set build timeout to 15 minutes
timeout: '900s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
  substitutions:
    _REGION: 'asia-south2'
